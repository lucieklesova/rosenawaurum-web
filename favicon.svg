<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6B73C"/>
      <stop offset="100%" stop-color="#D98C1F"/>
    </linearGradient>
  </defs>

  <!-- Head shape -->
  <path d="M16 40
           Q12 28 20 20
           Q28 12 40 18
           Q52 24 48 36
           Q44 48 32 50
           Q22 52 16 40 Z"
        fill="url(#fur)"/>

  <!-- Ear (cut style) -->
  <path d="M26 20 Q22 26 28 30"
        stroke="white"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="38" cy="30" r="2" fill="#222"/>

  <!-- Nose -->
  <circle cx="46" cy="34" r="2.5" fill="#5A3A1A"/>

  <!-- Mouth -->
  <path d="M42 38 Q38 40 34 38"
        stroke="#5A3A1A"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"/>
</svg>
